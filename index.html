<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beautiful Moments ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🌈 Background */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #5f72ff, #9b23ea, #ff758c, #42e695);
    z-index: -3;
}

/* Glow */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.1), transparent);
    z-index: -2;
}

/* ✨ Particles */
.particle {
    position: absolute;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* 🎀 Ribbon */
.ribbon {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
}

.ribbon-line {
    width: 75%;
    height: 8px;
    background: linear-gradient(90deg, #ff416c, #ff4b2b);
    border-radius: 20px;
    transition: 0.6s;
}

.ribbon-knot {
    position: absolute;
    font-size: 32px;
    transition: 0.5s;
}

.cut .ribbon-line {
    transform: scaleX(0);
    opacity: 0;
}

.cut .ribbon-knot {
    transform: scale(0) rotate(30deg);
    opacity: 0;
}

/* 🚪 Door */
.door-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
}

.door {
    width: 50%;
    height: 100%;
    background: linear-gradient(135deg, #bb5970, #d37261);
    transform-origin: left;
    transition: transform 1.5s ease;
    z-index: 5;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
}

.right {
    transform-origin: right;
}

.open .left {
    transform: rotateY(-120deg);
}

.open .right {
    transform: rotateY(120deg);
}

/* Slider */
.slider {
    width: 320px;
    height: 520px;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* Slides */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transform: translateX(50px) scale(1.05);
    transition: all 0.8s ease;
}

.slide.active {
    opacity: 1;
    transform: translateX(0) scale(1);
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 30px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* ✨ Text */
.text {
    color: #fff;
    font-size: 20px;
    line-height: 1.6;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    animation: textReveal 1.2s ease forwards;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

@keyframes textReveal {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Mobile */
@media (max-width: 400px) {
    .slider {
        width: 92%;
        height: 500px;
    }
}
</style>
</head>

<body>

<!-- ✨ Particles -->
<script>
for (let i = 0; i < 30; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    let size = Math.random() * 6 + 3;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(p);
}
</script>

<!-- 🎀 Ribbon -->
<div class="ribbon" id="ribbon">
    <div class="ribbon-line"></div>
    <div class="ribbon-knot">🎀</div>
</div>

<!-- 🚪 Door -->
<div class="door-screen" id="door">
    <div class="door left"></div>
    <div class="door right"></div>
</div>

<!-- 💎 Slider -->
<div class="slider">

    <div class="slide active">
        <img src="kuni1.jpeg">
        <div class="overlay">
            <div class="text">Your presence makes everything feel lighter ✨</div>
        </div>
    </div>

    <div class="slide">
        <img src="kuni2.jpeg">
        <div class="overlay">
            <div class="text">There’s a calmness that follows wherever you go 🌸</div>
        </div>
    </div>

    <div class="slide">
        <img src="kuni3.jpeg">
        <div class="overlay">
            <div class="text">Moments around you always feel a little more special 🌼</div>
        </div>
    </div>

    <div class="slide">
        <img src="kuni4.jpeg">
        <div class="overlay">
            <div class="text">Keep being the amazing person you are ✨</div>
        </div>
    </div>

</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;
let started = false;

document.body.addEventListener("click", () => {

    if (!started) {
        started = true;

        // 🎀 Cut ribbon
        document.getElementById("ribbon").classList.add("cut");

        // 🚪 Open door after delay
        setTimeout(() => {
            document.getElementById("door").classList.add("open");
        }, 700);

        return;
    }

    nextSlide();
});

function nextSlide() {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}
</script>

</body>
</html>
